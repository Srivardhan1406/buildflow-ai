<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuildFlow AI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
</head>
<body>

<div class="app-wrapper">

    <header class="main-header">
        <h1>BuildFlow AI</h1>
        <p>Generate structured app architecture instantly</p>
    </header>

    <div class="content-container">

        <!-- INPUT -->
        <section class="section">
            <label class="section-title">Describe your product idea</label>

            <textarea id="prompt"
            placeholder="Build ecommerce app with login cart admin dashboard"></textarea>

            <div class="chip-container">
                <button class="chip-link" onclick="fillPrompt('Build CRM app with login dashboard admin')">CRM</button>
                <button class="chip-link" onclick="fillPrompt('Build ecommerce app with login cart admin payments')">Ecommerce</button>
                <button class="chip-link" onclick="fillPrompt('Build job portal with login dashboard admin')">Job Portal</button>
            </div>

            <button class="btn-main" onclick="generateSchema()">Generate Schema</button>
        </section>

        <!-- METRICS -->
        <section class="section metrics-panel">
            <h3>System Metrics</h3>

            <div class="metrics-grid">

                <div class="metric-box">
                    <small>Requests</small>
                    <strong id="req">0</strong>
                </div>

                <div class="metric-box">
                    <small>Success</small>
                    <strong id="succ">0</strong>
                </div>

                <div class="metric-box">
                    <small>Failures</small>
                    <strong id="fail">0</strong>
                </div>

                <div class="metric-box">
                    <small>Repairs</small>
                    <strong id="rep">0</strong>
                </div>

                <div class="metric-box">
                    <small>Latency</small>
                    <strong id="lat">0 ms</strong>
                </div>

                <div class="metric-box">
                    <small>Clarifications</small>
                    <strong id="clar">0</strong>
                </div>

            </div>
        </section>

        <!-- OUTPUT -->
        <section class="section output-panel">

            <div class="output-head">
                <h3>Generated Output</h3>
                <button class="btn-copy" onclick="copyText()">Copy JSON</button>
            </div>

            <pre id="result">Your generated JSON will appear here.</pre>

        </section>

    </div>

</div>

<script>

function fillPrompt(text){
    document.getElementById("prompt").value = text;
}

async function generateSchema(){

    const prompt = document.getElementById("prompt").value.trim();

    if(prompt === ""){
        alert("Please enter your product idea.");
        return;
    }

    document.getElementById("result").textContent = "Generating...";

    try{

        const res = await fetch('/generate',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({prompt:prompt})
        });

        const data = await res.json();

        document.getElementById("result").textContent =
        JSON.stringify(data,null,2);

        loadStats();

    }catch(error){

        document.getElementById("result").textContent =
        "Error generating schema.";

    }
}

async function loadStats(){

    try{

        const res = await fetch('/stats?t=' + Date.now());
        const data = await res.json();

        document.getElementById("req").textContent  = data.requests || 0;
        document.getElementById("succ").textContent = data.success || 0;
        document.getElementById("fail").textContent = data.failures || 0;
        document.getElementById("rep").textContent  = data.repairs || 0;
        document.getElementById("lat").textContent  = (data.avg_latency_ms || 0) + " ms";
        document.getElementById("clar").textContent = data.clarifications || 0;

    }catch(error){
        console.log(error);
    }
}

function copyText(){
    navigator.clipboard.writeText(
        document.getElementById("result").textContent
    );
}

window.onload = function(){
    loadStats();
    setInterval(loadStats, 3000);
};

</script>

</body>
</html>
